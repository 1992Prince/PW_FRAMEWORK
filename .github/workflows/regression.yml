name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  
  schedule:
    - cron: '30 0 * * *'
  
  workflow_dispatch:        # <-- yeh add karna hoga
    inputs:
      environment:
        description: 'Environment to test against'
        required: false
        default: 'staging'
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
      options: --user 1001
    env:
      ENV:              E2E2
      APP_URL:          https://eventhub.rahulshettyacademy.com/login
      APP_STG_URL:      https://eventhub.rahulshettyacademy.com/login
      APP_E2E_URL:      https://eventhub.rahulshettyacademy.com/login
      API_URL:          https://api.staging.myapp.com
      SERVICE_USER:     eventhubtestuser1@gmail.com
      SERVICE_PASSWORD: Eventhub@2026
      BUILD_NO:         ${{ github.run_number }}
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: npm install
    - name: Run Playwright tests
      run: npx playwright test --retries=1 --workers=1
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-results
        path: test-results/
        retention-days: 30
